<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="65%" r="70%">
      <stop offset="0%" stop-color="#1e1710"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#c8921a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c8921a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c060"/>
      <stop offset="40%" stop-color="#c8921a"/>
      <stop offset="100%" stop-color="#8a5e0a"/>
    </linearGradient>
    <linearGradient id="brassLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d070"/>
      <stop offset="100%" stop-color="#b07810"/>
    </linearGradient>
    <linearGradient id="rocketGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4aa40"/>
      <stop offset="50%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#b08820"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Rounded rect clip for iOS icon shape -->
  <g clip-path="url(#rounded)">

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Atmospheric glow behind gantry -->
  <ellipse cx="256" cy="210" rx="160" ry="130" fill="url(#glow)"/>

  <!-- Stars - small scattered dots -->
  <g fill="#e8d8a0" opacity="0.35">
    <circle cx="80" cy="60" r="1.2"/><circle cx="140" cy="42" r="0.9"/>
    <circle cx="200" cy="75" r="1.4"/><circle cx="310" cy="38" r="1.0"/>
    <circle cx="380" cy="68" r="1.3"/><circle cx="430" cy="45" r="0.8"/>
    <circle cx="460" cy="90" r="1.1"/><circle cx="55" cy="110" r="0.9"/>
    <circle cx="100" cy="140" r="0.8"/><circle cx="420" cy="130" r="1.2"/>
    <circle cx="470" cy="160" r="0.9"/><circle cx="60" cy="190" r="1.0"/>
    <circle cx="165" cy="55" r="0.7"/><circle cx="355" cy="95" r="0.8"/>
  </g>

  <!-- ===== LAUNCH GANTRY STRUCTURE ===== -->

  <!-- Main vertical tower - left leg -->
  <rect x="210" y="148" width="14" height="188" fill="url(#brass)"/>
  <!-- Main vertical tower - right leg -->
  <rect x="290" y="148" width="14" height="188" fill="url(#brass)"/>

  <!-- Cross bracing - diagonal struts -->
  <line x1="224" y1="155" x2="290" y2="198" stroke="#c8921a" stroke-width="5" stroke-linecap="round"/>
  <line x1="290" y1="155" x2="224" y2="198" stroke="#a07010" stroke-width="5" stroke-linecap="round"/>
  <line x1="224" y1="210" x2="290" y2="253" stroke="#c8921a" stroke-width="5" stroke-linecap="round"/>
  <line x1="290" y1="210" x2="224" y2="253" stroke="#a07010" stroke-width="5" stroke-linecap="round"/>
  <line x1="224" y1="265" x2="290" y2="308" stroke="#c8921a" stroke-width="5" stroke-linecap="round"/>
  <line x1="290" y1="265" x2="224" y2="308" stroke="#a07010" stroke-width="5" stroke-linecap="round"/>

  <!-- Horizontal platform braces -->
  <rect x="210" y="193" width="94" height="8" fill="url(#brassLight)" rx="2"/>
  <rect x="210" y="248" width="94" height="8" fill="url(#brassLight)" rx="2"/>
  <rect x="210" y="303" width="94" height="8" fill="url(#brassLight)" rx="2"/>

  <!-- Top crossbar / crane arm -->
  <rect x="182" y="142" width="150" height="12" fill="url(#brass)" rx="3"/>
  <!-- Top cap -->
  <rect x="240" y="128" width="34" height="18" fill="url(#brassLight)" rx="2"/>
  <!-- Crane cable -->
  <line x1="257" y1="142" x2="257" y2="172" stroke="#d4aa40" stroke-width="3"/>

  <!-- Base platform / launch pad -->
  <rect x="188" y="334" width="138" height="10" fill="url(#brass)" rx="2"/>
  <rect x="196" y="342" width="122" height="6" fill="#8a5e0a" rx="1"/>

  <!-- ===== ROCKET ===== -->
  <!-- Rocket body -->
  <rect x="242" y="178" width="30" height="140" fill="url(#rocketGrad)" rx="4"/>
  <!-- Rocket nose cone -->
  <path d="M242,178 Q257,138 272,178 Z" fill="#f0d868"/>
  <!-- Rocket fins -->
  <path d="M242,290 L226,328 L242,318 Z" fill="#c8921a"/>
  <path d="M272,290 L288,328 L272,318 Z" fill="#c8921a"/>
  <!-- Rocket window -->
  <circle cx="257" cy="222" r="10" fill="#1e2a3a" stroke="#e8c060" stroke-width="2.5"/>
  <circle cx="257" cy="222" r="6" fill="#0a1520" opacity="0.8"/>
  <circle cx="254" cy="219" r="2.5" fill="#4a8ab8" opacity="0.6"/>

  <!-- Engine exhaust glow -->
  <ellipse cx="257" cy="336" rx="18" ry="8" fill="#e87020" opacity="0.5" filter="url(#softglow)"/>
  <ellipse cx="257" cy="340" rx="10" ry="5" fill="#f8d040" opacity="0.7" filter="url(#softglow)"/>

  <!-- ===== CITY HORIZON LINE ===== -->
  <!-- Industrial cityscape silhouette in the lower third -->
  <g fill="#2a1e10" opacity="0.95">
    <!-- Factory complex left -->
    <rect x="30" y="362" width="48" height="60"/>
    <rect x="38" y="348" width="10" height="18"/><!-- chimney -->
    <rect x="52" y="354" width="8" height="12"/><!-- chimney 2 -->
    <rect x="78" y="370" width="32" height="52"/>
    <rect x="82" y="355" width="7" height="18"/>

    <!-- Middle buildings -->
    <rect x="112" y="358" width="40" height="64"/>
    <rect x="120" y="344" width="9" height="18"/>
    <rect x="152" y="368" width="28" height="54"/>
    <rect x="180" y="372" width="20" height="50"/>

    <!-- Right side factory -->
    <rect x="310" y="364" width="38" height="58"/>
    <rect x="316" y="350" width="8" height="18"/>
    <rect x="330" y="356" width="7" height="14"/>
    <rect x="348" y="370" width="44" height="52"/>
    <rect x="358" y="355" width="10" height="18"/>
    <rect x="392" y="374" width="30" height="48"/>
    <rect x="422" y="366" width="36" height="56"/>
    <rect x="426" y="350" width="8" height="20"/>
    <rect x="438" y="356" width="7" height="16"/>
    <rect x="458" y="372" width="28" height="50"/>
  </g>

  <!-- Smoke from chimneys -->
  <g fill="#3a2e20" opacity="0.4">
    <ellipse cx="42" cy="342" rx="6" ry="5"/>
    <ellipse cx="39" cy="334" rx="5" ry="4"/>
    <ellipse cx="56" cy="348" rx="5" ry="4"/>
    <ellipse cx="86" cy="348" rx="6" ry="5"/>
    <ellipse cx="124" cy="337" rx="6" ry="5"/>
    <ellipse cx="120" cy="329" rx="4" ry="4"/>
    <ellipse cx="320" cy="344" rx="6" ry="5"/>
    <ellipse cx="362" cy="348" rx="5" ry="4"/>
    <ellipse cx="430" cy="344" rx="6" ry="5"/>
    <ellipse cx="442" cy="349" rx="5" ry="4"/>
  </g>

  <!-- Ground fill below city -->
  <rect x="0" y="420" width="512" height="92" fill="#0e0a06"/>

  <!-- Horizon glow line -->
  <rect x="0" y="418" width="512" height="3" fill="#8a5e0a" opacity="0.6"/>

  <!-- ===== IH MONOGRAM STAMP ===== -->
  <g transform="translate(390, 430)">
    <!-- Stamp border circle -->
    <circle cx="0" cy="0" r="44" fill="none" stroke="#c8921a" stroke-width="2.5" opacity="0.7"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#c8921a" stroke-width="1" opacity="0.4"/>
    <!-- IH text -->
    <text x="0" y="8" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold"
          fill="#c8921a" opacity="0.9" letter-spacing="3">IH</text>
    <!-- Small text around circle rim -->
    <text x="0" y="-22" text-anchor="middle" font-family="Georgia, serif" font-size="7"
          fill="#c8921a" opacity="0.55" letter-spacing="2">IRON HORIZON</text>
    <text x="0" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="6"
          fill="#c8921a" opacity="0.5" letter-spacing="1.5">1850 · 1950</text>
  </g>

  </g><!-- end clip -->
</svg>
